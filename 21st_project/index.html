<!-- 
요구사항

로고는 스타벅스 사이트 로고 활용
레이아웃도 비슷하게 구성 (오른쪽에 aisde 부분 추가)
색깔도 비슷하게 구성(베이지색?)
간격은 설정해도 되고 안해도 된다

메뉴 목록
- 로그인
- 가입
- 상품
- 장바구니
- 주문

메뉴는 상단바에 목록 형태로 만든다
윗단에 header 태그 할용 (베이지색)
하단에 footer 태그 활용 (회색)
중단은 section 태그 활용 (노란색)
오른쪽바는 aside 태그 활용 (보라색)

메뉴 목록은
ul요소와 li요소로 구성해야 한다
li요소 내부에 a태그와 href를 활용해야 한다
ul요소들은 header 안에서 오른쪽에 배치
li요소들은 밑줄이 없어야 한다


로고는
img 태그를 활용해서 구현

aside 영역은 작게 잡는다

footer 영역은 회사에 대한 간단한 소개 등이 들어가는데
복붙해도 되고 코멘트를 적어도 되고

section 영역은 내용이 많을 경우 스크롤 되도록 한다.
-->
<!doctype html>
<html>
  <head>
    <title>21회차 프로젝트</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      .bg-sb-beige {
        background-color: rgb(246, 245, 239);
      }
      .bg-plum {
        background-color: plum;
      }
      .bg-yellow {
        background-color: lightyellow;
      }
      .bg-gray {
        background-color: gray;
      }

      body {
        display: flex;
        flex-direction: column;
        min-height: 100vh;
        font-family: 'Malgun Gothic', sans-serif;
      }

      header {
        height: 120px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 0 5%;
      }
      header img {
        height: 80px;
        object-fit: contain;
      }
      header ul {
        display: flex;
        flex-direction: row;
        list-style: none;
        gap: 24px;
      }
      header ul li a {
        text-decoration: none;
        color: #1e3932;
        font-weight: 600;
        font-size: 15px;
      }
      header ul li a:hover {
        color: #00704a;
      }

      .main-container {
        display: flex;
        flex: 1; /* 남은 공간을 모두 차지 */
      }
      section {
        flex: 1;
        overflow-y: auto; /* 내용이 많을 경우 스크롤 */
        padding: 24px;
      }
      aside {
        width: 200px; /* aside 작게 고정 */
        padding: 16px;
      }

      footer {
        color: white;
        text-align: center;
        padding: 20px;
        font-size: 13px;
        line-height: 1.8;
      }
    </style>
  </head>
  <body>
    <header class="bg-sb-beige">
      <img src="./21st_logo.png" />
      <ul>
        <li><a href="#">로그인</a></li>
        <li><a href="#">가입</a></li>
        <li><a href="#">상품</a></li>
        <li><a href="#">장바구니</a></li>
        <li><a href="#">주문</a></li>
      </ul>
    </header>
    <div class="main-container">
      <section class="bg-yellow"></section>
      <aside class="bg-plum"></aside>
    </div>
    <footer class="bg-gray">
      사업자등록번호 : 201-81-21515 주식회사 에스씨케이컴퍼니 대표이사 : 손정현
      TEL : 1522-3232 개인정보 보호책임자 : 이찬우 ⓒ 2026 Starbucks Coffee
      Company. All Rights Reserved.
    </footer>
  </body>
</html>

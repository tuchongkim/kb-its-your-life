<!doctype html>
<html>
  <head>
    <style>
      .y {
        background-color: yellow;
        width: 400px;
        height: 400px;
        position: absolute;
        /* position: relative; */
        top: 100px;
        left: 200px;
        overflow: hidden;
      }
      .r {
        background-color: red;
        /* position: absolute; */
        position: relative;
        top: 300px;
        left: 300px;
      }
      .g {
        background-color: green;
      }
      .b {
        background-color: blue;
      }
      .r,
      .g,
      .b {
        width: 150px;
        height: 150px;
      }
    </style>
  </head>
  <body>
    <div class="y">
      YELLOW
      <div class="r">RED</div>
      <div class="g">GREEN</div>
      <div class="b">BLUE</div>
    </div>
  </body>
</html>

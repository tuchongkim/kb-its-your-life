<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      ul {
        /* 자식이 부모영역을 벗어났을 때 어떻게 할 것인가 */
        overflow: hidden;
      }
      li {
        list-style: none;
        float: left;
        padding: 15px;
      }
      li:first-child {
        border-radius: 10px 0 0 10px;
      }
      li:last-child {
        border-radius: 0 10px 10px 0;
      }
      li:nth-child(2n) {
        background-color: #ff0003;
      }
      li:nth-child(2n + 1) {
        background-color: #800000;
      }
    </style>
  </head>
  <body>
    <ul>
      <li>첫 번쨰</li>
      <li>두 번쨰</li>
      <li>세 번쨰</li>
      <li>네 번쨰</li>
      <li>다섯 번쨰</li>
      <li>여섯 번쨰</li>
      <li>일곱 번쨰</li>
    </ul>
    <h1>
      Lorem ipsum dolor sit amet consectetur adipisicing elit. Ipsum consequatur
      aspernatur, commodi illum iusto sapiente voluptates iure optio labore
      eligendi fuga nobis reprehenderit saepe itaque laborum nulla qui hic enim?
    </h1>
  </body>
</html>

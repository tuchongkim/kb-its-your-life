<!doctype html>
<html>
    <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <link rel="stylesheet" type="text/css" media="screen" href="main.css" />
    <script src="main.js"></script> -->
  </head>
  <body>
    <div id="html5">
      <h1>HTML5버전에 포함된 입력양식용 속성들</h1>
      <!-- 보안 문제를 피하기 위해 autocomplete="off"를 사용한다 -->
      <form autocomplete="off">
        <fieldset>
          <legend>한줄입력란</legend>
          <input type="text" name="t" value="test" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-numbers-input-form-50.png" alt="숫자" />
          <input type="number" name="t4" value="5" min="1" max="10" />      
        </fieldset>
        <fieldset>
          <img src="../images/icons8-email-50.png" />
          <input type="email" placeholder="필수입력항목입니다" required />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-phone-50.png" />
          <input type="tel" value="010" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-calendar-50.png" />
          <input type="date" />
        </fieldset>
        <fieldset>
          <img src="../images/icons8-search-50.png" />
          <input type="search" placeholder="검색어를 입력하세요" />
        </fieldset>
        <input type="button" value="일반버튼" />
        <input type="submit" value="전송" />
        <input type="reset" value="초기화" />
      </form>
    </div>
  </body>
</html>

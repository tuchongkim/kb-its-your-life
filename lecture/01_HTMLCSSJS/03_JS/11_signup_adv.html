<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      window.addEventListener('load', function () {
        //DOM 트리에서 type속성값이 button인 input객체 찾기
        const btDupchkObj = document.querySelector('input[type=button]');

        btDupchkObj.addEventListener('click', function () {
          //DOM트리에서 id 속성값이 "id"인 객체 찾기
          const idObj = document.querySelector('#id');
          //객체의 value프로퍼티 : idObj.value
          //alert(`${idObj.value}는 사용가능한 아이디입니다`);
          //DOM 트리에서 class 속성값이 iddupchk 객체 찾기
          const spanDupchkObj = document.querySelector('.iddupchk');
          spanDupchkObj.innerHTML = `${idObj.value}는 사용가능한 아이디입니다`;
        });

        //submit 버튼이 클릭되면 click 이벤트 발생 -> submit 버튼이 포함된 form의 submit이벤트 자동발생
        //DOM 트리에서 type 속성값이 submit인 input 객체 찾기
        const submitObj = document.querySelector('input[type=submit]');
        submitObj.addEventListener('click', function () {
          alert('submit 버튼이 클릭됨');
        });
        //DOM 트리에서 class속성값이 signup인 form객체 찾기
        const formObj = document.querySelector('form.signup');
        formObj.addEventListener('submit', function (e) {
          e.preventDefault(); //이벤트 기본 핸들러 막기
          //전송되기 전에 할 일 작성, form의 submit 이벤트 핸들러에 작성해주는 것이 좋다
          //alert('폼이 전송됨');

          //유효성 검사: 비밀번호 값과 비밀번호 확인값이 다른 경우 "비밀번호가 서로 다릅니다" alert창 띄우기
          const pwdObj1 = document.querySelector('#pwd');
          const pwdObj2 = document.querySelector('#pwd2');

          if (pwdObj1.value !== pwdObj2.value) {
            alert('비밀번호가 서로 다릅니다');
            // e.preventDefault(); //이벤트 기본 핸들러 막기
            return false;
          }

          //정상입력된 경우
          //일반함수로 콜백함수를 작성한 경우 formObj 대신 this를 써도 똑같이 동작한다
          formObj.method = 'post';
          formObj.action = 'http://localhost:3000/signup';
          formObj.submit();
        });
      });
    </script>
  </head>
  <body>
    <form class="signup">
      <label for="id">아이디 : </label>
      <input type="text" id="id" name="id" required />
      <input type="button" value="아이디중복확인" />
      <span class="iddupchk"></span>

      <br />
      <label for="pwd1">비밀번호 : </label>
      <input type="password" id="pwd" name="pwd1" required /><br />
      <label for="pwd2">비밀번호 확인 : </label>
      <input type="password" id="pwd2" required /><br />
      <label for="e">이메일 : </label
      ><input type="email" id="e" name="email" required /><br />

      <input type="submit" value="가입" />
      <input type="reset" value="초기화" />

      <button>가입</button
      ><!-- type="submit"효과 -->
      <button type="reset">초기화</button>
    </form>
  </body>
</html>

<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <script>
      const score = [82, 96, 54, 76, 9, 100, 69, 88];
      console.log('before = ' + score);

      score.sort(); // 기본적으로 문자열로 형변환 후 정렬 처리
      /* 
      자바스크립트 엔진은 배열 내부에 어떤 값들이 있을지 모른다
      문자열로 타입 변환은 항상 오류 없이 수행 가능하다
      정렬함수에서 문자열 - 문자열은 숫자로 변환 후 수행된다
      */
      console.log('after1 = ' + score);

      score.sort((left, right) => {
        return left - right;
      });
      console.log('after2 = ' + score);
    </script>
  </head>
  <body>
    <ul>
      <li class="item" data-writer="Hong">item1</li>
      <li class="item">item2</li>
      <li class="item">item3</li>
      <li class="item">item4</li>
      <li class="item">item5</li>
    </ul>
  </body>
</html>

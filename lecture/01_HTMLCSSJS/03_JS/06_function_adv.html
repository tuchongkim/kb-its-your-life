<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script>
      // 함수의 종류
      // 이름을 갖는 함수 function f1() {}
      // 이름없는 함수    function() {}
      let f1 = function () {
        console.log('이름없는 함수');
      };
      f1();

      (function () {
        console.log('이름없는 함수2');
      })();

      //매개변수
      let f2 = function (p1, p2) {
        console.log(p1, p2);
      };
      f2(1, 'hello');
      f2(1); //인자갯수와 매개변수갯수가 불일치, 결과: 1 undefined
      let result1 = f2(1, 2);
      console.log(result1); //반환값이 없는 함수를 호출하여 반환값을 대입, 결과: undefined

      //callback function: 함수의 인자로 전달되는 함수
      f2(1, function () {
        console.log('이름없는 함수3');
      });

      let f3 = function (p1, p2, p3) {
        // f3 함수를 뜯어보지 않으면 콜백함수가 언제, 몇번 호출되는지 알 수 없다
        window.setTimeout(function () {
          p1(p2, p3);
        }, 1000);
        // for (let i = 0; i < 3; i++) {
        //   p1(p2, p3);
        // }
        // p1(p2, p3);
      };

      f3(
        function (p4, p5) {
          console.log(p4 + p5);
        },
        1,
        2,
      );

      f3(
        function (p4, p5) {
          alert(p4 + ' + ' + p5 + ' = ' + (p4 + p5));
        },
        10,
        20,
      );

      f3(
        (p4, p5) => {
          console.log('화살표함수', p4, p5);
        },
        100,
        200,
      );
    </script>
  </head>
  <body></body>
</html>

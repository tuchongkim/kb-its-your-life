<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Page Title</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <script></script>
  </head>
  <body>
    <div style="width: 500px; height: 300px; background-color: yellow">
      <a href="https://kbstar.com">KB</a>
    </div>
    <script>
      //DOM 트리에서 a객체 찾기
      //a객체에서 click이벤트가 발생하면 배경색을 red로 변경한다
      //a객체의 click 기본 이벤트핸들러 : href속성값에 해당하는 URL로 요청
      //   const aObj = document.querySelector('a[href="https://kbstar.com"]');
      //   aObj.addEventListener('click', function (e) {
      //     this.style.backgroundColor = 'red';
      //     e.preventDefault();
      //     e.stopPropagation(); //부모쪽으로 이벤트가 전파(버블링)되는 것을 중지

      //     console.log(this);
      //   });

      const aObj = document.querySelector('a[href="https://kbstar.com"]');
      aObj.addEventListener('click', (e) => {
        e.preventDefault();

        console.log(this);
      });

      //DOM트리에서 div객체 찾기
      //div 객체에서 click이벤트가 발생하면 배경색을 green으로 변경
      const divObj = aObj.parentNode;
      divObj.addEventListener('click', function (e) {
        divObj.style.backgroundColor = 'green';
        console.log('----------div객체-----------');
        //console.log(this); //쓰지 않는 것을 권장한다. 헷갈릴 수 있다.
        console.log(e.target); //이벤트의 출처
        console.log(e.currentTarget); //event를 처리하는 현재 객체
      });
    </script>
  </body>
</html>

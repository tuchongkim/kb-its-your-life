<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Vue Watch Example</title>
  </head>
  <body>
    <div id="app">
      이름 :
      <input
        type="text"
        v-model.trim="name"
        placeholder="영문 두글자 이상을 입력하세요"
      /><br />
      <ul>
        <li v-for="c in contacts" :key="c.no">{{c.name}} : {{c.tel}}</li>
      </ul>
      <div v-show="isLoading">검색중...</div>
    </div>

    <!-- 🛑 이 부분의 주소를 아래처럼 끝까지 적어야 합니다! -->
    <!-- 1. lodash -->
    <script src="https://cdn.jsdelivr.net/npm/lodash@4.17.21/lodash.min.js"></script>

    <!-- 2. axios -->
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <!-- 3. Vue -->
    <script src="https://unpkg.com/vue"></script>

    <script>
      const BASEURL = 'https://contactsvc.bmaster.kro.kr';
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return { name: '', contacts: [], isLoading: false };
        },
        watch: {
          name(current) {
            if (current.length >= 2) {
              this.fetchContacts();
            } else {
              this.contacts = [];
            }
          },
        },
        methods: {
          fetchContacts: _.debounce(function () {
            this.isLoading = true;
            axios
              .get(BASEURL + `/contacts_long/search/${this.name}`)
              .then((response) => {
                this.isLoading = false;
                this.contacts = response.data;
              })
              .catch((err) => {
                this.isLoading = false;
              });
          }, 300),
        },
      }).mount('#app');
    </script>
  </body>
</html>

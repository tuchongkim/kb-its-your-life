<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>가입</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <!-- <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font awesome/6.5.2/ css /all.min.css"
      integrity="sha512 SnH5WK+bZxgPHs44uWIX+LLJAJ9/2PkPKZ5QiAj6Ta86w+fsb2TkcmfRyVX3pBnMFcV7oQPJkl9QevSCWr3W6A=="
      crossorigin="anonymous"
      referrerpolicy="no referrer"
    /> -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  </head>
  <body>
    <div id="app">
      <form class="signup container mt-4" @submit.prevent="signup">
        <!-- labe의 class="form-label"은 라벨 아래쪽에 약간의 여백(margin-bottom: 0.5rem)을 자동으로 주어 입력창과 딱 붙지 않게 띄워줍니다-->
        <div class="mb-3">
          <label for="id" class="form-label">아이디 : </label>
          <div class="input-group">
            <input
              type="text"
              id="id"
              name="id"
              required
              v-model="person.id"
              @focus="
        idExist = true;
        $event.target.select();
      "
              class="form-control"
            />
            <input
              type="button"
              value="아이디중복확인"
              @click="iddupchk"
              class="btn btn-outline-secondary"
            />
          </div>
          <span class="iddupchk" v-if="!idExist"
            >{{person.id}}는 사용가능한 아이디입니다
          </span>
        </div>
        <!-- 비밀번호 -->
        <div class="mb-3">
          <label for="pwd" class="form-label">비밀번호</label
          ><input
            type="password"
            id="pwd"
            name="pwd1"
            required
            v-model="person.pwd"
            class="form-control"
          />
        </div>
        <!-- 비밀번호확인 -->
        <div class="mb-3">
          <label for="pwd2" class="form-label">비밀번호확인: </label
          ><input
            type="password"
            id="pwd2"
            required
            v-model="pwd2"
            class="form-control"
          />
        </div>
        <!--이메일-->
        <div class="mb-3">
          <label for="e" class="form-label">이메일 :</label
          ><input
            type="email"
            id="e"
            name="email"
            required
            v-model="person.email"
            class="form-control"
          />
        </div>
        <!-- 버튼들 -->
        <div class="mb-3">
          <!-- <input
            type="submit"
            value="가입"
            :style="{visibility: !idExist ? 'visible' : 'hidden'}"
            class="btn btn-primary w-50"
          /> -->
          <input
            type="submit"
            value="가입"
            :class="submitButtonClass"
            class="btn btn-primary w-50"
          />
          <!-- <input type="submit" value="가입" v-show="!idExist" /> -->
          <input type="reset" value="초기화" class="btn btn-secondary w-50" />
        </div>
      </form>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      var vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            person: { id: '', pwd: '', email: '' },
            pwd2: '',
            idExist: true, //초기값 - 아이디 없으면 false, 아이디 있으면 true
          };
        },
        computed: {
          // 의존하는 데이터(idExist)가 변경될 때만 호출됩니다. 값이 변하지 않으면 이전에 계산된 결과값을 그대로 사용
          submitButtonClass() {
            return {
              // 여기서 invisible은 요소를 숨김상태로 만드는 bootstrap의 class입니다.
              invisible: this.idExist,
            };
          },
        },
        methods: {
          async iddupchk(e) {
            // const url = `http://localhost:3000/iddupchk?id=${this.person.id}`;
            const url = `http://localhost:3000/iddupchk/${this.person.id}`;
            try {
              const response = await fetch(url);
              console.log(response);
              if (response.status == 200) {
                this.idExist = false;
              } else {
                this.idExist = true;
                alert('이미 사용중인 아이디입니다');
              }
            } catch (err) {
              //Network오류, 잘못된 URL인 경우
            }
            // this.idExist = false; //아이디가 없는 경우
          },
          signup() {
            //비밀번호값과 비밀번호확인값이 다른 경우 "비밀번호가 서로 다릅니다"라는 alert창 띄우기
            if (this.person.pwd !== this.pwd2) {
              alert('비밀번호가 서로 다릅니다');
              return false;
            }
            alert(this.person.email);
            //정상입력된 경우
            const method = 'post';
            const url = 'http://localhost:3000/signup';

            //비동기 요청응답 : XmlHttpRequest객체, fetch()
            //new URLSearchParams() : this.person객체내용을 id=XX&pwd=YY&email=ZZ@a.com형태로 변환시켜 제출
            // const searchParams = new URLSearchParams(this.person);
            // const requestInit = {
            //   method: method,
            //   body: searchParams,
            //   headers: {
            //     'Content-Type': 'application/x-www-form-urlencoded',
            //   },
            // };

            const jsonStr = JSON.stringify(this.person);
            const requestInit = {
              method: method,
              body: jsonStr,
              headers: {
                'Content-Type': 'application/json',
              },
            };
            fetch(url, requestInit)
              .then((response) => {
                return response.text();
              })
              .then((responseText) => {
                alert(responseText);
              })
              .catch((err) => {
                alert(err.message);
              });
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>

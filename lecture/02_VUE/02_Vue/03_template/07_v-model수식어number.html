<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03-07</title>
</head>

<body>
  <p>
    v-model.number :
    이 수식어를 지정하면 숫자가 입력될 경우 number타입의 값으로 자동형변환되어 데이터 옵션값으로 반영됩니다.
    숫자로 변환 가능한 값은 숫자로 변환하고, 그렇지 않은 값은 문자열로 받아냅니다
  </p>
  <div id="app">
    <input type="text" v-model.number="num" /><br />
    입력된 수 : <span>{{ num }}</span>
  </div>
  <script type="text/javascript" src="https://unpkg.com/vue"></script>
  <script type="text/javascript">
    var vm = Vue.createApp({
      name: "App",
      data() {
        return { num: 0 };
      },
    }).mount("#app");
  </script>
</body>

</html>

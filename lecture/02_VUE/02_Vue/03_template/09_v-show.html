<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8" />
  <title>03-09</title>
</head>

<body>
  <p>
    v-show는 화면에 보여줄지 말지를 결정하는 디렉티브입니다.
    HTML요소는 미리 생성하고,
    요소에 대해 v-show에 부여된 조건이 false라면 display css스타일 속성을 none으로 지정하는 것과 같습니다.
  </p>
  <div id="app">
    예금액 : <input type="text" v-model="amount" />
    <img v-show="amount < 0" src="https://contactsvc.bmaster.kro.kr/img/error.png" title="마이너스는 허용하지 않습니다"
      style="width: 15px; height: 15px; vertical-align: middle" />
  </div>
  <script type="text/javascript" src="https://unpkg.com/vue"></script>
  <script type="text/javascript">
    var vm = Vue.createApp({
      data() {
        return { amount: "" };
      },
    }).mount("#app");
  </script>
</body>

</html>

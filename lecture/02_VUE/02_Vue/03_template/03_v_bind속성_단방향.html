<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>단방향테스트</title>
</head>

<body>
  요소의 다양한 속성(attribute)값을 단방향으로 동적바인딩하기 위해 사용합니다
  단방향 속성 :
  Model의 변화가 View에는 반영된다
  View의 변화가 Model에 반영안됨
  v-bind: 또는 :로 표현한다
  <div id="app">
    <input id="a" type="text" v-bind:value="message">
    <img :src="imagePath" />
  </div>
  <script type="text/javascript" src="https://unpkg.com/vue"></script>
  <script type="text/javascript">
    var vm = Vue.createApp({
      name: "App",
      data() {
        return {
          message: "v-bind 디렉티브",
          imagePath: "https://contactsvc.bmaster.kro.kr/photos/18.jpg",
        };
      },
    }).mount("#app");
  </script>
</body>

</html>

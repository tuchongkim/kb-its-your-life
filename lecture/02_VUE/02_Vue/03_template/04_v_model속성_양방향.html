<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>03-04</title>
</head>

<body>
  <p>
    앞절에서 {{}}, v-text, v-html, v-bind디렉티브를 살펴보았는데 모두 단방향 데이터 바인딩만 지원합니다. 
    하지만 사용자로부터 입력값을 받고 싶은 경우에는 양방향 데이터 바인딩을 사용하면
    편리합니다. 이럴 때 사용하는 디렉티브가 바로 v-model입니다.
  </p>
  <div id="app">
    <input id="a" type="text" v-model="name" />
    <br />
    입력하신 이름 : <span>{{name}}</span>
  </div>
  <script type="text/javascript" src="https://unpkg.com/vue"></script>
  <script type="text/javascript">
    var vm = Vue.createApp({
      name: "App",
      data() {
        return { name: "" };
      },
    }).mount("#app");
  </script>
</body>

</html>

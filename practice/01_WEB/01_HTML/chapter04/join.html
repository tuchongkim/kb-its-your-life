<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <form>
      <fieldset>
        <legend>회원가입</legend>
        <table>
          <tr>
            <td><label for="userId">사용자 ID</label></td>
            <td><input id="userId" type="text" name="userId" /></td>
          </tr>
          <tr>
            <td><label for="userPw">비밀번호</label></td>
            <td><input id="userPw" type="password" name="userPw" /></td>
          </tr>
          <tr>
            <td><label for="userPwCheck">비밀번호 확인</label></td>
            <td>
              <input id="userPwCheck" type="password" name="userPwCheck" />
            </td>
          </tr>
          <tr>
            <td><label for="userName">이름</label></td>
            <td><input id="userName" type="text" name="userName" /></td>
          </tr>
          <tr>
            <td>성별</td>
            <td>
              <input id="man" type="radio" name="gender" value="m" />
              <label for="man">남</label>
              <input id="woman" type="radio" name="gender" value="w" />
              <label for="woman">여</label>
            </td>
          </tr>
          <tr>
            <td>취미</td>
            <td>
              <input id="soccer" type="checkbox" name="hobby" value="soccer" />
              <label for="soccer">축구</label>
              <input
                id="baseball"
                type="checkbox"
                name="hobby"
                value="baseball"
              />
              <label for="baseball">야구</label>
              <input
                id="volleyball"
                type="checkbox"
                name="hobby"
                value="volleyball"
              />
              <label for="volleyball">배구</label>
              <input
                id="basketball"
                type="checkbox"
                name="hobby"
                value="basketball"
              />
              <label for="basketball">농구</label>
            </td>
          </tr>
          <tr>
            <td><label for="userMail">email</label></td>
            <td><input id="userMail" type="email" name="userMail" /></td>
          </tr>
          <tr>
            <td>역할</td>
            <td>
              <select>
                <option>ADMIN</option>
                <option>관리자</option>
                <option>일반회원</option>
              </select>
            </td>
          </tr>
        </table>
        <input type="submit" value="확인" />
        <input type="reset" value="다시쓰기" />
      </fieldset>
    </form>
  </body>
</html>

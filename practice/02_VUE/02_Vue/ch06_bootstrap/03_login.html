<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script

      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container">
      <div class="mx-auto" style="width: 500px">
        <h1><i class="fa-solid fa-arrow-right-to-bracket"></i> 로그인</h1>

        <form>
          <div class="mt-3">
            <label for="userId"
              ><i class="fa-solid fa-user"></i> 사용자 ID:</label
            >
            <input type="text" id="userId" name="userId" class="form-control" />
          </div>

          <div class="mt-3">
            <label for="pwd"><i class="fa-solid fa-lock"></i> 비밀번호:</label>
            <input type="text" id="pwd" name="pwd" class="form-control" />
          </div>

          <!-- <button class="btn btn-primary w-100 mt-3">
            <i class="fa-solid fa-arrow-right-to-bracket"></i> 로그인
          </button> -->

          <div class="d-grid mt-3">
            <button class="btn btn-primary">
              <i class="fa-solid fa-arrow-right-to-bracket"></i> 로그인
            </button>
          </div>
        </form>
      </div>
    </div>
  </body>
</html>

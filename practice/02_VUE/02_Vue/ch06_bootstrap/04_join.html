<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </head>
  <body>
    <div class="container mx-auto" style="width: 500px">
      <h1 class="mb-5"><i class="fa-solid fa-user-plus"></i> 회원 가입</h1>

      <form>
        <div class="mb-3">
          <label for="userId"
            ><i class="fa-solid fa-user"></i> 사용자 ID:</label
          >
          <input type="text" id="userId" name="userId" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="pwd"><i class="fa-solid fa-lock"></i> 비밀번호:</label>
          <input type="password" id="pwd" name="pwd" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="pwd2"
            ><i class="fa-solid fa-lock"></i> 비밀번호 확인:</label
          >
          <input type="password" id="pwd2" name="pwd2" class="form-control" />
        </div>
        <div class="mb-3">
          <label for="email"
            ><i class="fa-regular fa-envelope"></i> email:</label
          >
          <input type="email" id="email" name="email" class="form-control" />
        </div>
        <div class="mb-4">
          <label for="avatar"
            ><i class="fa-solid fa-user-astronaut"></i> 아바타 이미지:</label
          >
          <input type="file" id="avatar" class="form-control" />
        </div>

        <div class="text-center mb-3">
          <button type="submit" class="btn btn-primary">
            <i class="fa-solid fa-user-plus"></i> 회원가입
          </button>
        </div>
      </form>
    </div>
  </body>
</html>

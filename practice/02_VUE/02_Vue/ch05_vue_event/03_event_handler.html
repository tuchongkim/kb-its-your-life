<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Document</title>
  </head>
  <body>
    <div id="app">
      <input type="text" :value="name" @input="handler($event)" />
      <br />
      이름: <span>{{name}}</span>
    </div>

    <script src="https://unpkg.com/vue"></script>
    <script>
      let vm = Vue.createApp({
        name: 'App',
        data() {
          return {
            name: '',
          };
        },
        methods: {
          handler(e) {
            this.name = e.target.value;
          },
        },
      }).mount('#app');
    </script>
  </body>
</html>

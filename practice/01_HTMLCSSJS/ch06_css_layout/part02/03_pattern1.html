<!doctype html>
<html>
  <head>
    <title>Layout</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        width: 960px;
        margin: 0 auto;
        overflow: hidden;
      }
      #menu {
        width: 260px;
        float: left;
      }
      #section {
        width: 700px;
        float: left;
      }
      li {
        list-style: none;
      }
      @media screen and (max-width: 767px) {
        /* 스마트폰 사용시에는 전부 해제 */
        body {
          width: auto;
        }
        #menu {
          width: auto;
          float: none;
        }
        #sectin {
          width: auto;
          float: none;
        }
      }
    </style>
  </head>
  <body>
    <div id="menu">
      <ul>
        <li>메뉴A</li>
        <li>메뉴B</li>
        <li>메뉴C</li>
      </ul>
    </div>
    <div id="section">
      <h1>Lorem ipsum dolor sit amet</h1>
      <p>
        Lorem ipsum, dolor sit amet consectetur adipisicing elit. Tempora fuga
        molestiae temporibus voluptatibus animi vitae aliquid ducimus, quam
        voluptate, unde aspernatur assumenda soluta dolorum quae exercitationem
        totam quas sed possimus.
      </p>
    </div>
  </body>
</html>

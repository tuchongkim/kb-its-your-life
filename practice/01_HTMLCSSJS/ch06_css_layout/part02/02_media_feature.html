<!doctype html>
<html>
  <head>
    <title>Layout</title>
    <style>
      /* 스마트폰 */
      @media screen and (max-width: 767px) {
        body {
          background-color: red;
        }
      }
      /* 태블릿 PC */
      @media screen and (min-width: 768px) and (max-width: 959px) {
        body {
          background-color: green;
        }
      }
      /* 데스크톱 */
      @media screen and (min-width: 960px) {
        body {
          background-color: blue;
        }
      }
    </style>
  </head>
  <body>
    <h1>Lorem ipsum dolor sit amet</h1>
    <p>
      Lorem ipsum, dolor sit amet consectetur adipisicing elit. Tempora fuga
      molestiae temporibus voluptatibus animi vitae aliquid ducimus, quam
      voluptate, unde aspernatur assumenda soluta dolorum quae exercitationem
      totam quas sed possimus.
    </p>
  </body>
</html>

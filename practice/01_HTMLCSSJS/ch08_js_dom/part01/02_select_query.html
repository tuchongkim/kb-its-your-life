<!doctype html>
<html>
  <head>
    <title>DOM Basic</title>
    <script>
      window.addEventListener('load', function () {
        const headerObj = document.querySelector('h1');

        headerObj.style.backgroundColor = 'red';
        headerObj.style.color = 'orange';
        headerObj.innerHTML = 'From JavaScript';
      });
    </script>
  </head>
  <body>
    <h1>Header</h1>
    <h1>Header</h1>
    <h1>Header</h1>
  </body>
</html>

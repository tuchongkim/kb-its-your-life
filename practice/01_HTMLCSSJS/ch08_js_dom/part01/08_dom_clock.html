<!doctype html>
<html>
  <head>
    <title>DOM Basic</title>
    <script>
      window.addEventListener('load', function () {
        const clockObj = document.querySelector('#clock');

        setInterval(() => {
          const currentDate = new Date();
          clockObj.innerHTML = String(currentDate);
        }, 1000);
      });
    </script>
  </head>
  <body>
    <h1 id="clock"></h1>
  </body>
</html>

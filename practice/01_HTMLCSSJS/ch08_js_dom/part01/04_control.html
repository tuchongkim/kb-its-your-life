<!doctype html>
<html>
  <head>
    <title>DOM Basic</title>
    <script>
      window.addEventListener('load', function () {
        let output = '';
        for (let i = 0; i < 10; i++) {
          output += `<h1>Header - ${i}</h1>`;
        }

        // 단순 텍스트
        document.body.textContent = output;

        // HTML 태그 적용
        // document.body.innerHTML = output;
      });
    </script>
  </head>
  <body></body>
</html>

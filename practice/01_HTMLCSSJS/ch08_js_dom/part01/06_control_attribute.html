<!doctype html>
<html>
  <head>
    <title>DOM Basic</title>
    <script>
      window.addEventListener('load', function () {
        const imgObj = document.querySelector('#image');
        imgObj.src = 'https://placehold.co/300x200';
        imgObj.width = 300;
        imgObj.height = 200;
      });
    </script>
  </head>
  <body>
    <img id="image" />
  </body>
</html>
